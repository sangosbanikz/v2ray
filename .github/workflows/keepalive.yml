name: Keepalive
on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Keepalive
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          echo "heartbeat: $(date)" > keepalive.txt
          git add keepalive.txt
          git commit -m "Keepalive heartbeat" || exit 0
          git push
